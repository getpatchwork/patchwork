---
version: 2
sphinx:
  builder: "dirhtml"
  configuration: docs/conf.py
python:
  install:
    - requirements: docs/requirements.txt
build:
  os: "ubuntu-24.04"
  tools:
    python: "3.14"
  jobs:
    post_checkout:
      - git fetch --unshallow
      - git config remote.origin.fetch '+refs/heads/*:refs/remotes/origin/*'
      - git fetch --all --tags
